version: '3.8'

services:
  mysql:
    image: mysql:8.0.33
    container_name: interview-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: interview_db
      MYSQL_USER: interview
      MYSQL_PASSWORD: interview123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/init_data.sql:/docker-entrypoint-initdb.d/init_data.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max_allowed_packet=64M

  adminer:
    image: adminer:4.8.1
    container_name: interview-adminer
    restart: always
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: dracula
    depends_on:
      - mysql

volumes:
  mysql-data:
    driver: local
